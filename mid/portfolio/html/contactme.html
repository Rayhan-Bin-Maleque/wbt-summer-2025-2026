<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
</head>
<body>
    <form method="POST">
        <fieldset>
            <legend>Contact Me</legend>
            <table>
                <tr>
                    <td><label for="name">First Name:</label></td>
                    <td><input type="text" id="name" name="name" required></td>
                </tr>
                <tr>
                    <td><label for="lname">Last Name:</label></td>
                    <td><input type="text" id="lname" name="lname" required></td>
                </tr>
                <tr>
                    <td><label>Gender:</label></td>
                    <td>
                        <input type="radio" name="gender" value="male">Male
                        <input type="radio" name="gender" value="female">Female

                    </td>
                </tr>
                <tr>
                    <td><label for="email">Email:</label></td>
                    <td><input type="email" id="email" name="email" required></td>
                </tr>
            </table>
        </fieldset>

        <fieldset>
             <legend>Services</legend>
            <table>
                <tr>
                   <td>
                    <input type="checkbox" value="web developer">Web Developer
                    <input type="checkbox" value="Ai/ML">Ai/ML
                    <input type="checkbox" value="backend">Backend
                   </td>
                   </tr>
            </table>
        </fieldset>

        <fieldset>
             <legend>Reason of contact</legend>
            <table>
                <tr>
                    <td><label for="job">Reason of contact</label></td>
                    <td>    
                       <select id="Job" name="Job">

                        <option>Job</option>
                        <option>Projects</option>
                        <option>Thesis</option>

                       </select>
                    </td>
                        </tr>
            </table>
        </fieldset>

        <fieldset>
             <legend>Book slot:</legend>
            <table>
                <tr>
                    <td><label for="datetime">Select Date and Time:</label></td>
                    <td><input type="date" id="datetime" name="datetime"></td>  
                </tr>   
            </table>
        </fieldset>     
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </form>








</body>
</html>
